name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match the declared support (requires-python >=3.10 + classifiers 3.10-3.14).
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The unit tests mock the heavy backends; they only need these at import time.
      # scipy is the independent reference for the Wilson-CI / power cross-checks;
      # gguf crafts + reads the tiny GGUF files in the verify-safety arm tests.
      - run: pip install pytest huggingface_hub psutil scipy gguf
      # Build + install the package itself (no heavy deps) so import, the entry point,
      # and PEP 621/639 packaging metadata are exercised — not just the source tree.
      - run: pip install -e . --no-deps
      - run: pytest tests/ -q

  # The 0.3 release gate: a clean-venv install of the built wheel (real dependency
  # resolution, no mocks) must work on Linux AND Windows, and the CLI must run.
  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip  # the torch wheel dominates install time; cache it across runs

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Install wheel with full dependencies
        shell: bash
        run: pip install dist/*.whl

      - name: CLI smoke
        shell: bash
        run: |
          quantfit --help
          quantfit list
          python -c "import quantfit; print('quantfit', quantfit.__version__)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install ruff

      - name: Ruff check
        run: ruff check quantfit tests

      - name: Ruff format
        run: ruff format --check quantfit tests
