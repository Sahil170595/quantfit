name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The unit tests mock the heavy backends; they only need these at import time.
      - run: pip install pytest huggingface_hub psutil
      - run: pytest tests/ -q
