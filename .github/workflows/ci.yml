name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match the declared support (requires-python >=3.10 + classifiers 3.10-3.14).
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The unit tests mock the heavy backends; they only need these at import time.
      - run: pip install pytest huggingface_hub psutil
      # Build + install the package itself (no heavy deps) so import, the entry point,
      # and PEP 621/639 packaging metadata are exercised — not just the source tree.
      - run: pip install -e . --no-deps
      - run: pytest tests/ -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff

      - name: Ruff check
        run: ruff check quantfit tests

      - name: Ruff format
        run: ruff format --check quantfit tests
